# PostgreSQL — app chạy trên host. Biến POSTGRES_* đọc từ file .env ở root (hoặc mặc định bên dưới).
# Xem env.example → cp env.example .env

services:
  postgres:
    image: postgres:16-alpine
    container_name: debt_done_right_postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-debt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-debt_dev_secret}
      POSTGRES_DB: ${POSTGRES_DB:-debt_done_right}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
